services:
  - type: web
    name: smart-parking-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./data/parking.db
      - key: JWT_SECRET
        generateValue: true
      - key: RUN_SEED
        value: "true"
      - key: ARDUINO_INTERVAL_MS
        value: "15000"
      - key: CORS_ORIGIN
        sync: false
